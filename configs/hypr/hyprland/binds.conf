binds:scroll_event_delay = 0

bind = Ctrl Alt, Delete, exec, loginctl lock-session
bind = Ctrl Shift, Escape, exec, xdg-terminal-exec btop

bind = Super, Return, exec, wofi --show=drun --prompt=run
bind = Super, Escape, killactive
bind = Super Shift, Escape, forcekillactive
bind = , F11, fullscreen

bind = Super, W, exec, ~/.config/hypr/scripts/workspace/rename
bind = Super, E, exec, nautilus
bind = Super, R, exec, xdg-terminal-exec
bind = Super, T, exec, google-chrome-stable

bind = Super, A, exec, pidof hyprpicker || hyprpicker --render-inactive --autocopy
bind = Super, S, exec, pidof hyprpicker || hyprshot --mode=active --mode=window --output-folder=$HOME/Pictures/Screenshots
bind = Super, F, togglefloating
# bind = Super, G, togglesplit
bind = Super, G, layoutmsg, swapwithmaster

bind = , Print, exec, pidof hyprpicker || hyprshot --mode=active --mode=output --output-folder=$HOME/Pictures/Screenshots
bind = Super Shift, S, exec, pidof hyprpicker || hyprshot --mode=region --freeze --output-folder=$HOME/Pictures/Screenshots

bind = Super, Z, exec, code ~/dotfiles
bind = Super, X, exec, wl-paste | swappy -f -
bind = Super, V, exec, ~/.config/hypr/scripts/clipboard/cliphist
bind = Super, B, exec, ~/.config/hypr/scripts/clipboard/emoji

bind = Alt, Tab, cyclenext
bind = Alt, Tab, layoutmsg, swapwithmaster

bind = Super, Left, movefocus, l
bind = Super, Down, movefocus, d
bind = Super, Up, movefocus, u
bind = Super, Right, movefocus, r
bind = Super, H, movefocus, l
bind = Super, J, movefocus, d
bind = Super, K, movefocus, u
bind = Super, L, movefocus, r

bind = Super Shift, Left, movewindow, l
bind = Super Shift, Down, movewindow, d
bind = Super Shift, Up, movewindow, u
bind = Super Shift, Right, movewindow, r
bind = Super Shift, H, movewindow, l
bind = Super Shift, J, movewindow, d
bind = Super Shift, K, movewindow, u
bind = Super Shift, L, movewindow, r

binde = Super Shift Ctrl, Left, resizeactive, -10 0
binde = Super Shift Ctrl, Down, resizeactive, 0 10
binde = Super Shift Ctrl, Up, resizeactive, 0 -10
binde = Super Shift Ctrl, Right, resizeactive, 10 0
binde = Super Shift Ctrl, H, resizeactive, -10 0
binde = Super Shift Ctrl, J, resizeactive, 0 10
binde = Super Shift Ctrl, K, resizeactive, 0 -10
binde = Super Shift Ctrl, L, resizeactive, 10 0

bind = Super, 1, workspace, 1
bind = Super, 2, workspace, 2
bind = Super, 3, workspace, 3
bind = Super, 4, workspace, 4
bind = Super, 5, workspace, 5
bind = Super, 6, workspace, 6
bind = Super, 7, workspace, 7
bind = Super, 8, workspace, 8
bind = Super, 9, workspace, 9
bind = Super, 0, workspace, 10
bind = Super, Minus, workspace, empty
bind = Super, Q, togglespecialworkspace
bind = Super, Tab, workspace, m+1
bind = Super, Grave, workspace, m-1

bind = Super Shift, 1, movetoworkspace, 1
bind = Super Shift, 2, movetoworkspace, 2
bind = Super Shift, 3, movetoworkspace, 3
bind = Super Shift, 4, movetoworkspace, 4
bind = Super Shift, 5, movetoworkspace, 5
bind = Super Shift, 6, movetoworkspace, 6
bind = Super Shift, 7, movetoworkspace, 7
bind = Super Shift, 8, movetoworkspace, 8
bind = Super Shift, 9, movetoworkspace, 9
bind = Super Shift, 0, movetoworkspace, 10
bind = Super Shift, Minus, movetoworkspace, empty
bind = Super Shift, Q, movetoworkspace, special
bind = Super Shift, Tab, movetoworkspace, m+1
bind = Super Shift, Grave, movetoworkspace, m-1

bind = Super Shift Ctrl, 1, movetoworkspacesilent, 1
bind = Super Shift Ctrl, 2, movetoworkspacesilent, 2
bind = Super Shift Ctrl, 3, movetoworkspacesilent, 3
bind = Super Shift Ctrl, 4, movetoworkspacesilent, 4
bind = Super Shift Ctrl, 5, movetoworkspacesilent, 5
bind = Super Shift Ctrl, 6, movetoworkspacesilent, 6
bind = Super Shift Ctrl, 7, movetoworkspacesilent, 7
bind = Super Shift Ctrl, 8, movetoworkspacesilent, 8
bind = Super Shift Ctrl, 9, movetoworkspacesilent, 9
bind = Super Shift Ctrl, 0, movetoworkspacesilent, 10
bind = Super Shift Ctrl, Minus, movetoworkspacesilent, empty
bind = Super Shift Ctrl, Q, movetoworkspacesilent, special
bind = Super Shift Ctrl, Tab, movetoworkspacesilent, m+1
bind = Super Shift Ctrl, Grave, movetoworkspacesilent, m-1

bind = Super, mouse_up, workspace, m+1
bind = Super, mouse_down, workspace, m-1

bind = Super Shift, mouse_up, movetoworkspace, m+1
bind = Super Shift, mouse_down, movetoworkspace, m-1

bind = Super Shift Ctrl, mouse_up, movetoworkspacesilent, m+1
bind = Super Shift Ctrl, mouse_down, movetoworkspacesilent, m-1

bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow
bindc = Super, mouse:272, togglefloating
# bindc = Super, mouse:273, togglesplit
bindc = Super, mouse:273, layoutmsg, swapwithmaster

bindel = , XF86AudioLowerVolume, exec,  ~/.config/hypr/scripts/volume/lower
bindel = , XF86AudioRaiseVolume, exec,  ~/.config/hypr/scripts/volume/raise
bindl = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume/mute
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle

bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause

bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness/lower
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness/raise

gesture = 3, horizontal, workspace
