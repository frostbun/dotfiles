[font]
normal = { family = "JetBrainsMono Nerd Font" }
size = 16.0

[cursor]
style = { shape = "Beam", blinking = "Off" }
unfocused_hollow = false

[window]
decorations = "None"
dynamic_padding = true
opacity = 0.95

[window.dimensions]
columns = 128
lines = 32

[window.padding]
x = 4
y = 4

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[env]
TERM = "xterm-256color"

[colors]
# Tokyo Night Theme
[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[colors.cursor]
text = "#1a1b26"
cursor = "#c0caf5"

[colors.selection]
text = "#c0caf5"
background = "#283457"

[colors.normal]
black = "#15161e"
red = "#f7768e"
green = "#9ece6a"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#bb9af7"
cyan = "#7dcfff"
white = "#a9b1d6"

[colors.bright]
black = "#414868"
red = "#f7768e"
green = "#9ece6a"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#bb9af7"
cyan = "#7dcfff"
white = "#c0caf5"

[colors.hints]
start = { foreground = "#1a1b26", background = "#e0af68" }
end = { foreground = "#1a1b26", background = "#e0af68" }
